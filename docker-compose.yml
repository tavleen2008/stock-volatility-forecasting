version: '3.8'

services:
  redis:
    image: redis:alpine
    container_name: volatility_redis
    restart: unless-stopped
    # We do not expose the port to the host machine for security. 
    # It will only be accessible by the backend on the docker network.

  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: volatility_backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - ./server/.env
    environment:
      - REDIS_URL=redis://redis:6379
      - RUNNING_IN_DOCKER=true
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - redis

  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: volatility_frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - backend
