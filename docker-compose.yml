version: '3.8'

services:
  redis:
    image: redis:alpine
    container_name: volatility_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    # Port is exposed so your local Node app can connect to it.

  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: volatility_backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - ./server/.env
    environment:
      - REDIS_URL=redis://redis:6379
      - RUNNING_IN_DOCKER=true
      - ML_SERVICE_URL=http://ml:8080
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - redis

  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: volatility_frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - backend

  ml:
    build:
      context: ./ML/quant_pipeline
      dockerfile: Dockerfile
    container_name: volatility_ml
    restart: unless-stopped
    ports:
      - "8081:8080"
    env_file:
      - ./ML/quant_pipeline/.env
    depends_on:
      - redis
